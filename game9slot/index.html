// Rank system
const RANKS = [
  { max: 30,  rank: 'G',   color: '#aaaaaa' },
  { max: 60,  rank: 'F',   color: '#55aaff' },
  { max: 90,  rank: 'E',   color: '#33cc55' },
  { max: 120, rank: 'D',   color: '#cccc00' },
  { max: 150, rank: 'C',   color: '#ff7700' },
  { max: 180, rank: 'B',   color: '#ee2222' },
  { max: 210, rank: 'A',   color: '#ff55aa' },
  { max: 240, rank: 'S',   color: '#e0e0e0' },
  { max: 270, rank: 'SS',  color: '#ffcc00' },
  { max: 300, rank: 'SSS', color: 'rainbow' },
];

function getRankExtended(val) {
  if (val <= 300) return getRank(val);
  const tier = Math.floor((val - 301) / 30) + 4;
  return { rank: `S${tier}`, color: 'rainbow' };
}

function getRank(val) {
  for (const r of RANKS) { if (val <= r.max) return r; }
  return RANKS[RANKS.length - 1];
}

function applyRank(el, val) {
  const r = getRankExtended(val);
  el.textContent = r.rank;
  el.classList.remove('rank-rainbow');
  if (r.color === 'rainbow') {
    el.style.color = '';
    el.classList.add('rank-rainbow');
  } else {
    el.style.color = r.color;
  }
}

// BGM
let audioCtx = null;
let bgmNodes = [];
let bgmPlaying = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function startBgm() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const dur = 60;

  const chords = [
    [261.6, 329.6, 392.0, 493.9],
    [220.0, 261.6, 329.6, 440.0],
    [174.6, 261.6, 329.6, 415.3],
    [196.0, 246.9, 293.7, 392.0],
  ];
  const chordDur = dur / (chords.length * 3);

  for (let rep = 0; rep < 3; rep++) {
    for (let ci = 0; ci < chords.length; ci++) {
      for (const freq of chords[ci]) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        const start = now + (rep * chords.length + ci) * chordDur;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(0.015, start + 0.6);
        gain.gain.linearRampToValueAtTime(0.012, start + chordDur - 0.2);
        gain.gain.linearRampToValueAtTime(0.0001, start + chordDur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(start); osc.stop(start + chordDur + 0.1);
        bgmNodes.push(osc);
      }
    }
  }

  const melody = [523.3, 587.3, 659.3, 784.0, 659.3, 587.3, 523.3, 493.9, 440.0, 523.3, 587.3, 659.3];
  const noteDur = dur / melody.length;
  for (let i = 0; i < melody.length; i++) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(melody[i], now);
    const start = now + i * noteDur;
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.linearRampToValueAtTime(0.02, start + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.006, start + noteDur * 0.7);
    gain.gain.linearRampToValueAtTime(0.0001, start + noteDur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(start); osc.stop(start + noteDur + 0.1);
    bgmNodes.push(osc);
  }
}

function stopBgm() {
  for (const n of bgmNodes) { try { n.stop(); } catch(e) {} }
  bgmNodes = []; bgmPlaying = false;
}

    battleReady = false;
    spinBtn.style.display = 'none';
    stopBtn.style.display = 'none';
  }

  const totals = { hp: 0, atk: 0, def: 0 };
  let hasM = { hp: false, atk: false, def: false };
  for (const g of stageGains) {
    if (totals[g.type] !== undefined) { totals[g.type] += g.val; if (g.matched) hasM[g.type] = true; }
  }
  gainHp.textContent = totals.hp > 0 ? `+${totals.hp}` : '';
  gainHp.style.color = hasM.hp ? '#ffd700' : '';
  gainAtk.textContent = totals.atk > 0 ? `+${totals.atk}` : '';
  gainAtk.style.color = hasM.atk ? '#ffd700' : '';
  gainDef.textContent = totals.def > 0 ? `+${totals.def}` : '';
  gainDef.style.color = hasM.def ? '#ffd700' : '';
}

function makeReelItem(item) {
  const v = item.type === 'none' ? '' : item.type === 'atk' ? `攻撃+${item.value}` : item.type === 'def' ? `防御+${item.value}` : `体力+${item.value}`;
  return `<div class="reel-item"><div class="icon">${item.icon}</div><div class="item-text"><div class="item-name" style="color:${item.color}">${item.name}</div><div class="item-value" style="color:${item.color}88">${v}</div></div></div>`;
}

function buildReelStrip(reelIdx) {
  const reelEl = $('reel' + reelIdx);
  const strip = reelEl.querySelector('.reel-strip');
  const patLen = REEL_PATTERN.length;
  const offset = reelIdx * Math.floor(patLen / 3);
  const shifted = [];
  for (let i = 0; i < patLen; i++) shifted.push(REEL_PATTERN[(i + offset) % patLen]);

  let html = '';
  for (let c = 0; c < 3; c++) for (let j = 0; j < patLen; j++) html += makeReelItem(shifted[j]);
  strip.innerHTML = html;
  reelItems[reelIdx] = shifted;

  const totalH = patLen * ITEM_H;
  const s = stage; // 0-indexed
  const speed = 0.007745 * s * s - 0.276106 * s + 3.25; // 二次曲線: 1章3.25→12章1.15→20章0.8
  strip.style.transition = 'none';
  strip.style.animation = 'none';
  strip.offsetHeight;
  strip.style.setProperty('--pattern-h', `${totalH}px`);
  strip.style.animation = `reelSpin ${speed}s linear infinite`;
  reelEl.classList.remove('stopped');
}

function stopReel(reelIdx) {
  if (!spinning || reelStopped[reelIdx]) return;
  reelStopped[reelIdx] = true;
  const reelEl = $('reel' + reelIdx);
  const strip = reelEl.querySelector('.reel-strip');

  const matrix = new DOMMatrix(getComputedStyle(strip).transform);
  const currentY = matrix.m42;
  strip.style.animation = 'none';
  strip.style.transition = 'none';
  strip.style.transform = `translateY(${currentY}px)`;
  strip.offsetHeight;

  const patLen = REEL_PATTERN.length;
  const rawIdx = (REEL_CENTER - ITEM_H / 2 - currentY) / ITEM_H;
  const nearestAbsIdx = Math.round(rawIdx);
  const patIdx = ((nearestAbsIdx % patLen) + patLen) % patLen;
  reelStoppedItem[reelIdx] = reelItems[reelIdx][patIdx];

  const snapY = REEL_CENTER - ITEM_H / 2 - nearestAbsIdx * ITEM_H;
  strip.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.3, 1)';
  strip.style.transform = `translateY(${snapY}px)`;
  reelEl.classList.add('stopped');

  if (reelStopped[0] && reelStopped[1] && reelStopped[2]) onAllReelsStopped();
}

function onAllReelsStopped() {
  spinning = false;
  const a = reelStoppedItem[0], b = reelStoppedItem[1], c = reelStoppedItem[2];
  const matched = a.id === b.id && b.id === c.id;
  const mult = matched ? 1.5 : 1.0;
  const applied = [];
  for (let i = 0; i < 3; i++) {
    const item = reelStoppedItem[i];
    if (item.type !== 'none') {
      const val = Math.round(item.value * mult);
      applyItemWithValue(item.type, val);
      applied.push(`${item.name}(${itemEffectText(item.type, val)})`);
      stageGains.push({ type: item.type, val, matched });
    }
  }
  if (applied.length === 0) { resultText.textContent = 'ハズレ…'; resultText.className = 'miss'; }
  else if (matched) { resultText.textContent = `揃った！1.5倍！ ${applied.join(' ')}`; resultText.className = 'success'; }
  else { resultText.textContent = applied.join('　'); resultText.className = 'miss'; }
  spinsLeft--;
  updateUI();
  // 2回目以降は「回す」ボタンで手動開始
}

function itemEffectText(t, v) { return t === 'atk' ? `攻撃+${v}` : t === 'def' ? `防御+${v}` : t === 'hp' ? `体力+${v}` : ''; }
function applyItemWithValue(t, v) { if (t === 'atk') player.atk += v; else if (t === 'def') player.def += v; else if (t === 'hp') player.hp += v; }

function startSpinning() {
  spinning = true;
  reelStopped = [false, false, false];
  reelStoppedItem = [null, null, null];
  resultText.textContent = ''; resultText.className = '';
  for (let i = 0; i < 3; i++) buildReelStrip(i);
  updateUI();
}

function spin() {
  if (spinning || spinsLeft <= 0) return;
  startSpinning();
}

for (let i = 0; i < 3; i++) $('reel' + i).addEventListener('click', () => stopReel(i));

// ===== Battle (real-time, interruptible) =====
const FUKUTSU_ITEMS = [
  { label: '攻撃+5', value: 5, color: '#88ff88' },
  { label: '攻撃+10', value: 10, color: '#66dd66' },
  { label: '攻撃+15', value: 15, color: '#44cc44' },
  { label: '攻撃+30', value: 30, color: '#ffd700' },
  { label: '攻撃+50', value: 50, color: '#ff8800' },
  { label: '攻撃+100', value: 100, color: '#ff4444' },
  { label: '死亡', value: -1, color: '#880000' },
  { label: '死亡', value: -1, color: '#660000' },
];
let fukutsuUsedThisStage = false;
const fukutsuOverlay = $('fukutsu-overlay');
const fukutsuStrip = $('fukutsu-strip');

function showFukutsuSlot(bp, enemy, ed, resolve) {
  fukutsuOverlay.classList.add('visible');
  const fkH = 70;
  let html = '';
  for (let c = 0; c < 5; c++) for (const fi of FUKUTSU_ITEMS) {
    html += `<div class="fukutsu-item" style="color:${fi.color}">${fi.label}</div>`;
  }
  fukutsuStrip.innerHTML = html;
  const totalH = FUKUTSU_ITEMS.length * fkH;
  fukutsuStrip.style.setProperty('--fk-h', `${totalH}px`);
  fukutsuStrip.style.animation = 'none';
  fukutsuStrip.offsetHeight;
  fukutsuStrip.style.animation = `fukutsuSpin 0.75s linear infinite`;

  function stopFukutsu() {
    fukutsuOverlay.removeEventListener('click', stopFukutsu);
    const m = new DOMMatrix(getComputedStyle(fukutsuStrip).transform);
    const cy = m.m42;
    fukutsuStrip.style.animation = 'none';
    fukutsuStrip.style.transform = `translateY(${cy}px)`;
    fukutsuStrip.offsetHeight;
    const fkCenter = 100;
    const rawIdx = (fkCenter - fkH / 2 - cy) / fkH;
    const absIdx = Math.round(rawIdx);
    const patIdx = ((absIdx % FUKUTSU_ITEMS.length) + FUKUTSU_ITEMS.length) % FUKUTSU_ITEMS.length;
    const result = FUKUTSU_ITEMS[patIdx];
    const snapY = fkCenter - fkH / 2 - absIdx * fkH;
    fukutsuStrip.style.transition = 'transform 0.3s ease-out';
    fukutsuStrip.style.transform = `translateY(${snapY}px)`;

    setTimeout(() => {
      fukutsuOverlay.classList.remove('visible');
      fukutsuStrip.style.transition = '';
      resolve(result);
    }, 800);
  }
  fukutsuOverlay.addEventListener('click', stopFukutsu);
}

function doBattle() {
  const ed = ENEMIES[Math.min(stage, ENEMIES.length - 1)];
  const enemy = { ...ed };
  const bp = { hp: player.hp, atk: player.atk, def: player.def };
  fukutsuUsedThisStage = false;
  let turnCount = 0;

  // Intimidate: ATK -10% at start (表示はinitBattle内で)
  let intimidateLoss = 0;
  if (ed.traitId === 'intimidate') {
    intimidateLoss = bp.atk - Math.floor(bp.atk * 0.9);
    bp.atk = Math.floor(bp.atk * 0.9);
  }

  $('game-bg').style.opacity = '0.9';
  $('slot-area').style.display = 'none';

  // Show trait intro then start battle
  if (ed.trait) {
    const td = $('trait-display');
    $('trait-name').textContent = ed.trait;
    $('trait-desc').textContent = ed.traitDesc;
    $('trait-name').style.opacity = '0'; $('trait-name').style.transform = 'translateX(-20px)';
    $('trait-desc').style.opacity = '0'; $('trait-desc').style.transform = 'translateX(-20px)';
    td.classList.add('visible');
    setTimeout(() => { $('trait-name').style.opacity = '1'; $('trait-name').style.transform = 'translateX(0)'; }, 100);
    setTimeout(() => { $('trait-desc').style.opacity = '1'; $('trait-desc').style.transform = 'translateX(0)'; }, 600);
    setTimeout(() => { td.classList.remove('visible'); initBattle(); }, 2600);
  } else {
    initBattle();
  }

  function initBattle() {
  battleOverlay.classList.add('visible');
  document.querySelectorAll('.battle-side').forEach(el => el.classList.add('battle-bg-box'));
  const lossHp = $('loss-hp'), lossAtk = $('loss-atk'), lossDef = $('loss-def');
  lossHp.innerHTML = ''; lossAtk.innerHTML = ''; lossDef.innerHTML = '';
  lossHp.style.display = 'block'; lossAtk.style.display = 'block'; lossDef.style.display = 'block';
  if (intimidateLoss > 0) lossAtk.innerHTML += `<div style="color:#ff8800">-${intimidateLoss}威圧</div>`;
  // Show trait box during battle
  const traitBox = $('enemy-trait-box');
  if (ed.trait) { traitBox.textContent = `${ed.trait}：${ed.traitDesc}`; traitBox.style.display = 'block'; }

  let playerBlockCount = 0;
  let playerAbsorbedTotal = 0;
  let playerAbsorbedList = [];
  let enemyAbsorbedTotal = 0;
  battleLog.innerHTML = ''; battleAction.textContent = ''; battleAction.classList.remove('result-text'); battleDamage.innerHTML = '';
  $('b-enemy-name').textContent = enemy.name;
  $('b-enemy-hp').textContent = `体力 ${enemy.hp}`; $('b-enemy-hp').style.color = '';
  $('b-enemy-sub').textContent = `攻${enemy.atk}　防${enemy.def}`;
  $('b-player-hp').textContent = `体力 ${bp.hp}`; $('b-player-hp').style.color = '';
  $('b-player-sub').textContent = `攻${bp.atk}　防${bp.def}`;

  function sync() {
    pHp.textContent = bp.hp; pAtk.textContent = bp.atk; pDef.textContent = bp.def;
    $('b-player-hp').textContent = `体力 ${bp.hp}`;
    $('b-player-sub').textContent = `攻${bp.atk}　防${bp.def}`;
    $('b-enemy-hp').textContent = `体力 ${enemy.hp}`;
    $('b-enemy-sub').textContent = `攻${enemy.atk}　防${enemy.def}`;
  }

  function addLogRow(left, center, right) {
    battleLog.innerHTML += `<div class="turn-row"><div class="turn-left">${left}</div><div class="turn-center">${center}</div><div class="turn-right">${right}</div></div>`;
    battleLog.scrollTop = battleLog.scrollHeight;
  }

  function showBattleResult() {
    const won = enemy.hp <= 0;
    // 戦闘後に累計吸収分をATKから引く
    const atkLoss = playerAbsorbedTotal;
    bp.atk = Math.max(0, bp.atk - atkLoss);
    for (const loss of playerAbsorbedList) lossAtk.innerHTML += `<div>-${loss}</div>`;
    player.hp = bp.hp; player.atk = bp.atk; player.def = bp.def;
    setTimeout(() => {
      battleDamage.innerHTML = '';
      battleAction.classList.add('result-text');
      battleAction.style.color = won ? '#ffd700' : '#ff4444';
      battleAction.textContent = won ? '無事倒した' : '敗北した';
      const atkLossMsg = atkLoss > 0 ? `<br><span style="color:#ff8888;font-size:22px">攻撃 -${atkLoss}（戦闘の代償）</span>` : '';
      const quote = won ? ed.lose : (ed.win || ed.taunt);
      battleDamage.innerHTML = `<div style="color:rgba(255,200,100,0.6);font-size:26px;font-style:italic;margin-top:12px">「${quote}」${atkLossMsg}</div>`;
      battleLog.classList.add('battle-end');
      resultPhase = 'battle-done';
      battleWon = won;
      updateUI();
    }, 800);
  }

  function doEnemyTurn() {
    if (bp.hp <= 0 || enemy.hp <= 0) { showBattleResult(); return; }
    turnCount++;

    // Trait: regen
    if (ed.traitId === 'regen5') { enemy.hp += 5; }
    if (ed.traitId === 'earthRegen') { enemy.hp += 10; }
    if (ed.traitId === 'absolute' && enemy.hp <= ed.hp / 2) { enemy.hp += 8; }

    // Trait: absolute ATK boost when HP <= 50%
    if (ed.traitId === 'absolute' && enemy.hp <= ed.hp / 2) {
      enemy.atk = Math.ceil(ed.atk * 1.5);
    }

    // Trait: thunderSpeed - 2 attacks
    const enemyAttacks = ed.traitId === 'thunderSpeed' ? 2 : (ed.traitId === 'doubleAtk' && turnCount % 3 === 0 ? 2 : 1);

    battleAction.style.color = '#ff9999';
    battleAction.textContent = `${enemy.name}の攻撃！${enemyAttacks > 1 ? '（' + enemyAttacks + '連撃）' : ''}`;
    battleDamage.innerHTML = '';

    let atkIdx = 0;
    function doOneEnemyAtk() {
    setTimeout(() => {
      const eDmg = Math.max(0, enemy.atk - bp.def);
      const absorbed = Math.min(bp.def, enemy.atk);
      enemyAbsorbedTotal += absorbed; // 敵のATKへの累計ツケ
      bp.def = Math.max(0, bp.def - Math.ceil(absorbed / 2));
      if (eDmg > 0) bp.hp = Math.max(0, bp.hp - eDmg);

      // 右上の各ステータス下にマイナス表示
      const defLoss = Math.ceil(absorbed / 2);
      if (eDmg > 0) lossHp.innerHTML += `<div>-${eDmg}</div>`;
      if (defLoss > 0) lossDef.innerHTML += `<div>-${defLoss}</div>`;

      if (eDmg > 0) {
        const eLabel = absorbed > 0 ? '攻撃が通った' : '完全攻撃した';
        battleDamage.innerHTML = `<span class="dmg-pop" style="color:#ff6666">−${eDmg}</span>`;
        $('b-player-hp').style.color = '#ff2222'; setTimeout(() => $('b-player-hp').style.color = '', 300);
      } else {
        battleDamage.innerHTML = `<span class="dmg-pop" style="color:#999999">完全防御した</span>`;
        playerBlockCount++;
      }

      const eLogLabel = eDmg > 0 ? (absorbed > 0 ? '攻撃が通った' : '完全攻撃した') : '完全防御した';
      const left = `<span class="turn-atk">攻撃 ${enemy.atk}</span>`;
      const right = eDmg > 0
        ? `<span class="turn-dmg">${eDmg}ダメージ</span><br><span class="turn-def">${eLogLabel}</span><br><span class="turn-cost">防御 -${absorbed}</span>`
        : `<span class="turn-block">${eLogLabel}</span><br><span class="turn-def">防御 ${bp.def+absorbed}</span>`;
      addLogRow(left, '→', right);
      // Trait: scorch - extra DEF loss
      if (ed.traitId === 'scorch') { bp.def = Math.max(0, bp.def - 5); lossDef.innerHTML += `<div style="color:#ff8800">-5灼熱</div>`; }
      sync();

      if (bp.hp <= 0) { showBattleResult(); return; }
      atkIdx++;
      if (atkIdx < enemyAttacks) { doOneEnemyAtk(); }
      else { setTimeout(doPlayerTurn, 500); }
    }, 500);
    }
    doOneEnemyAtk();
  }

  function doPlayerTurn() {
    if (bp.hp <= 0 || enemy.hp <= 0) { showBattleResult(); return; }

    // Trait: petrify (every 3 turns) / freeze (every 4 turns)
    if ((ed.traitId === 'petrify' && turnCount % 3 === 0) || (ed.traitId === 'freeze' && turnCount % 4 === 0)) {
      battleAction.style.color = '#aaaaaa';
      battleAction.textContent = ed.traitId === 'petrify' ? '石化！動けない！' : '凍結！動けない！';
      battleDamage.innerHTML = '';
      setTimeout(doEnemyTurn, 800);
      return;
    }

    // 不屈の闘志チェック: 6回連続で完全防御されたら発動（何回でも）
    if (playerBlockCount >= 6) {
      playerBlockCount = 0;
      battleAction.style.color = '#ffd700';
      battleAction.textContent = '攻撃が通らない…！';
      battleDamage.innerHTML = '';
      setTimeout(() => {
        showFukutsuSlot(bp, enemy, ed, (result) => {
          if (result.value === -1) {
            bp.hp = 0;
            sync();
            battleAction.style.color = '#ff4444';
            battleAction.textContent = '力尽きた…';
            battleDamage.innerHTML = '';
            showBattleResult();
          } else {
            bp.atk += result.value;
            sync();
            battleAction.style.color = '#ffd700';
            battleAction.textContent = `不屈の闘志！ 攻撃+${result.value}！`;
            battleDamage.innerHTML = '';
            setTimeout(doPlayerAttack, 800);
          }
        });
      }, 600);
      return;
    }

    doPlayerAttack();
  }

  function doPlayerAttack() {
    battleAction.style.color = '#99ccff';
    battleAction.textContent = 'あなたの攻撃！';
    battleDamage.innerHTML = '';

    setTimeout(() => {
      // Trait: dragonScale - first 5 turns, damage halved
      let pDmg = Math.max(0, bp.atk - enemy.def);
      if (ed.traitId === 'dragonScale' && turnCount <= 5) pDmg = Math.floor(pDmg / 2);
      const pAbsorbed = Math.min(enemy.def, bp.atk);
      playerAbsorbedTotal += pAbsorbed;
      if (pAbsorbed > 0) playerAbsorbedList.push(pAbsorbed);
      const enemyDefLoss = Math.ceil(pAbsorbed / 2);
      enemy.def = Math.max(0, enemy.def - enemyDefLoss);
      if (pDmg > 0) enemy.hp = Math.max(0, enemy.hp - pDmg);

      if (pDmg > 0) {
        const pLabel = enemy.def > 0 ? '攻撃が通った' : '完全攻撃した';
        battleDamage.innerHTML = `<span class="dmg-pop" style="color:#66bbff">${pDmg} ダメージをあたえた</span>`;
        $('b-enemy-hp').style.color = '#ff2222'; setTimeout(() => $('b-enemy-hp').style.color = '', 300);
        playerBlockCount = 0;
      } else {
        battleDamage.innerHTML = `<span class="dmg-pop" style="color:#999999">完全防御された</span>`;
        playerBlockCount++;
      }

      const pLogLabel = pDmg > 0 ? (enemy.def > 0 ? '攻撃が通った' : '完全攻撃した') : '完全防御された';
      const right = `<span class="turn-atk">攻撃 ${bp.atk}</span>`;
      const left = pDmg > 0
        ? `<span class="turn-dmg">${pDmg}ダメージ</span><br><span class="turn-def">${pLogLabel}</span>`
        : `<span class="turn-block">${pLogLabel}</span><br><span class="turn-def">防御 ${enemy.def}</span>`;
      addLogRow(left, '←', right);
      sync();

      if (enemy.hp <= 0) { showBattleResult(); return; }
      setTimeout(doEnemyTurn, 500);
    }, 500);
  }

  // Trait: thunderSpeed - enemy goes first with 2 attacks already handled in doEnemyTurn
  setTimeout(doEnemyTurn, 600);
  } // end initBattle
} // end doBattle

// Hide battle trait on cleanup

cleanupBattle = function(showSlot) {

  $('battle-trait').style.display = 'none';
  $('enemy-trait-box').style.display = 'none';
};

// Event slot items
const EVENT_ITEMS = [
  { label: '一週間歩いた', value: -10, color: '#ff8888' },
  { label: '山を登った', value: -20, color: '#ff6666' },
  { label: '宿屋で休息した', value: 20, color: '#88ff88' },
  { label: '野宿した', value: 10, color: '#aaddaa' },
  { label: '夜盗におそわれた', value: -15, color: '#ff7777' },
  { label: '一か月歩いた', value: -30, color: '#ff4444' },
];
const eventOverlay = $('event-overlay');
const eventStrip = $('event-strip');

function showEventSlot(callback) {
  // Show travel background (no dark filter)
  $('game-bg').style.backgroundImage = 'url(img/travel.webp)';
  $('game-bg').style.opacity = '1';
  $('slot-area').style.display = 'none';
  eventOverlay.classList.add('visible');
  const evH = 60;
  // 5章後と10章後にマイナスが倍になる
  const eventMult = stage >= 10 ? 4 : stage >= 5 ? 2 : 1;
  let html = '';
  for (let c = 0; c < 5; c++) for (const ei of EVENT_ITEMS) {
    const val = ei.value < 0 ? ei.value * eventMult : ei.value;
    html += `<div class="event-item" style="color:${ei.color}">${ei.label}　${val > 0 ? '+' : ''}${val}</div>`;
  }
  eventStrip.innerHTML = html;
  const totalH = EVENT_ITEMS.length * evH;
  eventStrip.style.setProperty('--ev-h', `${totalH}px`);
  eventStrip.style.animation = 'none';
  eventStrip.offsetHeight;
  eventStrip.style.animation = `eventSpin 0.5s linear infinite`;

  // ランダムなタイミングで自動停止（1.5〜3秒）
  const stopDelay = 200 + 1000 + Math.random() * 700;
  setTimeout(stopEvent, stopDelay);

  function stopEvent() {
    const m = new DOMMatrix(getComputedStyle(eventStrip).transform);
    const cy = m.m42;
    eventStrip.style.animation = 'none';
    eventStrip.style.transform = `translateY(${cy}px)`;
    eventStrip.offsetHeight;
    const evCenter = 90;
    const rawIdx = (evCenter - evH / 2 - cy) / evH;
    const absIdx = Math.round(rawIdx);
    const patIdx = ((absIdx % EVENT_ITEMS.length) + EVENT_ITEMS.length) % EVENT_ITEMS.length;
    const result = EVENT_ITEMS[patIdx];
    const snapY = evCenter - evH / 2 - absIdx * evH;
    eventStrip.style.transition = 'transform 0.3s ease-out';
    eventStrip.style.transform = `translateY(${snapY}px)`;

    setTimeout(() => {
      const actualValue = result.value < 0 ? result.value * eventMult : result.value;
      player.hp = player.hp + actualValue;
      updateUI();
      $('event-title').textContent = `${result.label}（体力 ${actualValue > 0 ? '+' : ''}${actualValue}）`;
      setTimeout(() => {
        eventOverlay.classList.remove('visible');
        eventStrip.style.transition = '';
        $('slot-area').style.display = '';
        if (player.hp <= 0) {
          player.hp = 0;
          $('game-bg').style.opacity = '0.65';
          showGameover(false);
        } else {
          callback();
        }
      }, 1200);
    }, 600);
  }
}

function cleanupBattle(showSlot) {
  battleLog.classList.remove('battle-end');
  battleOverlay.classList.remove('visible');
  $('game-bg').style.opacity = '0.65';
  if (showSlot) $('slot-area').style.display = '';
  document.querySelectorAll('.battle-side').forEach(el => el.classList.remove('battle-bg-box'));
  $('loss-hp').style.display = 'none'; $('loss-atk').style.display = 'none'; $('loss-def').style.display = 'none';
}

function handleBattleDoneClick() {
  if (resultPhase !== 'battle-done') return;
  resultPhase = '';
  cleanupBattle(battleWon);

  if (battleWon) {
    stage++; stageGains = [];
    if (stage >= ENEMIES.length) {
      $('stage-display').style.display = 'none';
      $('enemy-info').style.display = 'none';
      $('player-info').style.display = 'none';
      $('slot-area').style.display = 'none';
      $('max-stage').style.display = 'none';
      resultPhase = 'ending-auto';
      // 全自動エンディングシーケンス
      setTimeout(() => {
        showEndingScene('img/victory.webp', ['全ての敵を倒した', '激しい戦いだったが……', 'これで全て終わった'], null, () => {
          setTimeout(() => {
            showEndingScene('img/ending.webp', ['愛すべき人のいる故郷に戻ってきた', 'ようやくだ……', 'ここに戻ってこれるのに８年かかった'], null, () => {
              setTimeout(() => {
                showEndingScene('img/family.webp', ['その後僕たちはこの村で……', '幸せな時間を過ごした', '悪くない人生だった'], '36px', () => {
                  overlay.style.background = '';
                  resultPhase = 'ending-clear';
                  showGameover(true);
                });
              }, 300);
            });
          }, 300);
        });
      }, 500);
      return;
    }
    // Show event slot before next stage
    resultText.textContent = ''; resultText.className = '';
    showEventSlot(() => {
      $('game-bg').style.opacity = '0.65';
      spinsLeft = SPINS_PER_STAGE;
      initReels(); startSpinning(); updateUI();
    });
  } else {
    setTimeout(() => showGameover(false), 300);
  }
}

battleOverlay.addEventListener('click', handleBattleDoneClick);

// エンディング自動シーン表示（0.5s fade in + 2.3s display + 0.4s fade out）
function showEndingScene(bgImage, lines, fontSize, callback) {
  $('game-bg').style.backgroundImage = `url(${bgImage})`;
  $('game-bg').style.opacity = '1';
  if (typeof lines === 'string') lines = [lines];
  overlayText.innerHTML = '';
  overlayText.className = 'win';
  if (fontSize) overlayText.style.fontSize = fontSize;
  overlayHint.textContent = '';
  overlay.style.background = 'transparent';
  overlay.style.transition = 'opacity 0.5s';
  overlay.style.opacity = '0';
  overlay.classList.add('visible');
  overlay.offsetHeight;
  overlay.style.opacity = '1';

  // Pre-create all lines hidden, then reveal one by one
  for (const line of lines) {
    const div = document.createElement('div');
    div.textContent = line;
    div.style.opacity = '0';
    div.style.transform = 'translateX(-20px)';
    div.style.transition = 'opacity 1.25s, transform 1.25s';
    div.style.lineHeight = '2.5';
    overlayText.appendChild(div);
  }

  let lineIdx = 0;
  const lineDelay = 1400;
  function showNextLine() {
    if (lineIdx >= lines.length) {
      setTimeout(() => {
        overlay.style.transition = 'opacity 0.2s';
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.classList.remove('visible');
          overlay.style.opacity = '';
          overlay.style.transition = '';
          overlayText.style.fontSize = '';
          overlayText.innerHTML = '';
          callback();
        }, 200);
      }, 1000);
      return;
    }
    const div = overlayText.children[lineIdx];
    div.style.opacity = '1';
    div.style.transform = 'translateX(0)';
    lineIdx++;
    setTimeout(showNextLine, lineDelay);
  }
  setTimeout(showNextLine, 500);
}


function showGameover(cleared) {
  const h2 = gameoverScreen.querySelector('h2');
  if (cleared) {
    h2.textContent = 'クリア'; h2.style.color = '#ffd700'; h2.classList.add('clear-glow');
    gameoverStats.textContent = `到達: 第${stage}章　体力${player.hp} 攻撃${player.atk} 防御${player.def}`;
    $('game-bg').style.backgroundImage = 'url(img/ending.webp)';
    $('game-bg').style.opacity = '0.7';
  } else {
    h2.textContent = 'おわり'; h2.style.color = '#ffffff'; h2.classList.remove('clear-glow');
    gameoverStats.textContent = `第${stage+1}章で敗北　体力${player.hp} 攻撃${player.atk} 防御${player.def}`;
    $('game-bg').style.backgroundImage = 'url(img/gameover.webp)';
    $('game-bg').style.opacity = '1';
    gameoverScreen.style.background = 'transparent';
  }
  $('stage-display').style.display = 'none';
  $('enemy-info').style.display = 'none';
  $('player-info').style.display = 'none';
  $('slot-area').style.display = 'none';
  $('max-stage').style.display = 'none';
  gameoverScreen.style.display = 'flex';
}

function initReels() {
  for (let i = 0; i < 3; i++) {
    const el = $('reel' + i);
    const strip = el.querySelector('.reel-strip');
    strip.style.animation = 'none'; strip.style.transition = 'none';
    const offset = i * Math.floor(REEL_PATTERN.length / 3);
    let html = '';
    for (let j = 0; j < REEL_PATTERN.length; j++) html += makeReelItem(REEL_PATTERN[(j + offset) % REEL_PATTERN.length]);
    strip.innerHTML = html;
    // Center item index 1 in the select line
    strip.style.transform = `translateY(${REEL_CENTER - ITEM_H / 2 - ITEM_H}px)`;
    el.classList.remove('stopped');
  }
}

let isFirstGame = true;

function startGame() {
  const wasFirst = isFirstGame;
  isFirstGame = false;

  function doStart() {
    player = { hp: 10, atk: 10, def: 10 };
    stage = 0; spinsLeft = SPINS_PER_STAGE; spinning = false; battleReady = false;
    resultText.textContent = ''; resultText.className = ''; stageGains = [];
    titleScreen.style.display = 'none'; gameoverScreen.style.display = 'none'; gameoverScreen.style.background = '';
    battleOverlay.classList.remove('visible'); stopBgm();
    overlay.classList.remove('visible'); overlay.style.background = ''; overlayLog.style.display = 'none'; resultPhase = '';
    spinBtn.disabled = false;
    spinBtn.style.borderColor = '';
    spinBtn.style.color = '';
    spinBtn.style.background = '';
    spinBtn.style.display = '';
    $('stop-btn').style.display = 'none';
    $('game-bg').style.opacity = '0.65';
    $('game-bg').style.backgroundImage = '';
    $('slot-area').style.display = '';
    $('stage-display').style.display = '';
    $('enemy-info').style.display = '';
    $('player-info').style.display = '';
    $('max-stage').style.display = '';
    initReels(); startSpinning(); updateUI();
  }

  if (wasFirst) {
    doStart();
  } else {
    // 先にゲームオーバー画面と背景を消す
    gameoverScreen.style.display = 'none';
    gameoverScreen.style.background = '';
    titleScreen.style.display = 'none';
    $('game-bg').style.backgroundImage = '';
    $('game-bg').style.opacity = '0';
    // 「そして次の旅が始まるのです」表示
    const nj = $('next-journey');
    nj.style.display = 'flex';
    nj.offsetHeight;
    nj.style.opacity = '1';
    setTimeout(() => {
      nj.style.opacity = '0';
      setTimeout(() => {
        nj.style.display = 'none';
        doStart();
      }, 300);
    }, 1300);
  }
}

function stopNextReel() {
  if (!spinning) return;
  for (let i = 0; i < 3; i++) { if (!reelStopped[i]) { stopReel(i); return; } }
}

spinBtn.addEventListener('click', () => {
  if (battleReady) { battleReady = false; doBattle(); }
  else if (!spinning && spinsLeft > 0) { startSpinning(); }
});
$('stop-btn').addEventListener('click', stopNextReel);

titleScreen.addEventListener('click', (e) => {
  if (e.target.classList.contains('dev-btn')) return;
  startGame();
});
document.querySelectorAll('.dev-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const s = parseInt(btn.dataset.stats);
    player = { hp: s, atk: s, def: s };
    stage = parseInt(btn.dataset.stage);
    spinsLeft = SPINS_PER_STAGE;
    spinning = false; battleReady = false;
    resultText.textContent = ''; resultText.className = ''; stageGains = [];
    titleScreen.style.display = 'none'; gameoverScreen.style.display = 'none'; gameoverScreen.style.background = '';
    battleOverlay.classList.remove('visible');
    overlay.classList.remove('visible'); resultPhase = '';
    initReels(); startSpinning(); updateUI();
  });
});
gameoverScreen.addEventListener('click', () => {
  if (resultPhase === 'ending-clear') {
    resultPhase = '';
    gameoverScreen.style.display = 'none';
    gameoverScreen.style.background = '';
    $('game-bg').style.backgroundImage = '';
    $('game-bg').style.opacity = '0.65';
    $('stage-display').style.display = '';
    $('enemy-info').style.display = '';
    $('player-info').style.display = '';
    $('slot-area').style.display = '';
    $('max-stage').style.display = '';
    isFirstGame = true;
    titleScreen.style.display = 'flex';
  } else {
    startGame();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (titleScreen.style.display !== 'none') { startGame(); return; }
    if (gameoverScreen.style.display === 'flex') { startGame(); return; }
    if (resultPhase === 'battle-done') { handleBattleDoneClick(); return; }
    if (spinning) { stopNextReel(); return; }
    else if (battleReady) { battleReady = false; doBattle(); }
    else if (spinsLeft > 0) { startSpinning(); }
  }
});

initReels();
</script>
