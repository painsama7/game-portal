<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6052048572694342" crossorigin="anonymous"></script>
  <title>戦車道 - 3D戦車バトル | ペインゲーム</title>
  <meta name="description" content="3D戦車バトルゲーム。表24+裏24の全48ステージ。通常弾とチャージ弾を使い分けて敵を殲滅。">
  <meta property="og:title" content="戦車道 - 3D戦車バトル">
  <meta property="og:description" content="全48ステージの3D戦車バトル。ワープポータルで戦況を覆せ。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pain-game.com/game8/">
  <link rel="canonical" href="https://pain-game.com/game8/">
  <style>
    @font-face {
      font-family: 'SoukouMincho';
      src: url('SoukouMincho.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Letrogo';
      src: url('851letrogo_007.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { background: #1a1a2e; overflow: hidden; font-family: 'SoukouMincho','Courier New', monospace; }
    canvas { display: block; }

    /* ── HP Panel (左上・格ゲー風) ────────────────────── */
    #hud-hp {
      position: fixed; top: 14px; left: 14px;
      color: #fff; font-size: 13px; pointer-events: none;
    }
    #hud-hp .label {
      font-family: 'Letrogo','Courier New',monospace;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(255,200,80,0.7); margin-bottom: 4px;
    }
    .hp-segs { display: flex; gap: 0; }
    .hp-seg {
      width: 38px; height: 14px;
      border: 2px solid rgba(255,180,60,0.8);
      border-right: none;
      transform: skewX(-14deg);
      transition: background 0.08s, box-shadow 0.08s;
    }
    .hp-seg:last-child { border-right: 2px solid rgba(255,180,60,0.8); }
    /* 左=赤 → 中=黄 → 右=緑 */
    .hp-seg:nth-child(1).hp-on { background: #ff2200; box-shadow: 0 0 7px #ff2200; border-color: rgba(255,100,60,0.9); }
    .hp-seg:nth-child(2).hp-on { background: #ff5500; box-shadow: 0 0 7px #ff5500; border-color: rgba(255,140,60,0.9); }
    .hp-seg:nth-child(3).hp-on { background: #ffaa00; box-shadow: 0 0 7px #ffaa00; border-color: rgba(255,190,60,0.9); }
    .hp-seg:nth-child(4).hp-on { background: #ffdd00; box-shadow: 0 0 7px #ffdd00; border-color: rgba(255,230,80,0.9); }
    .hp-seg:nth-child(5).hp-on { background: #88cc00; box-shadow: 0 0 7px #88cc00; border-color: rgba(160,220,60,0.9); }
    .hp-seg:nth-child(6).hp-on { background: #22bb00; box-shadow: 0 0 7px #22bb00; border-color: rgba(80,200,60,0.9); }
    .hp-seg:last-child.hp-on { border-right-color: inherit; }
    .hp-off {
      background: rgba(30,10,0,0.7) !important;
      box-shadow: none !important;
      border-color: rgba(100,50,20,0.5) !important;
    }
    .hp-seg.dmg-flash {
      background: #ffffff !important;
      box-shadow: 0 0 16px #fff !important;
    }

    #charge-status {
      margin-top: 6px; font-size: 12px; min-height: 16px;
      letter-spacing: 1px; font-weight: bold;
    }
    #charge-bar-wrap {
      margin-top: 5px; width: 140px; height: 12px;
      background: #333; border-radius: 4px; overflow: hidden; display: none;
      border: 1px solid #555;
    }
    #charge-bar {
      height: 100%; width: 0%; background: #ff8800;
      border-radius: 4px; transition: width 0.1s linear;
    }

    /* ── Stage + Enemy Count (右上) ────────────────────── */
    #hud-stage {
      position: fixed; top: 14px; right: 14px;
      color: #fff; font-size: 15px; font-weight: bold;
      pointer-events: none; text-shadow: 0 0 6px #000;
      text-align: right;
    }
    #stage-label {
      font-family: 'SoukouMincho','Courier New',monospace;
      letter-spacing: 3px;
    }
    #enemy-count {
      font-family: 'SoukouMincho','Courier New',monospace;
      color: #ff2200; font-size: 26px; font-weight: 900;
      text-shadow: 0 0 10px rgba(255,30,0,0.8), 0 0 25px rgba(255,50,0,0.4);
      margin-top: 4px; letter-spacing: 2px;
    }

    /* ── Progress Ring ──────────────────────────── */
    #progress-wrap {
      position: relative; width: 187px; height: 187px;
      margin-top: 8px; margin-left: auto;
    }
    #progress-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        rgba(100,50,20,0.5) 0deg 360deg
      );
      box-shadow: 0 0 8px rgba(255,120,0,0.15);
    }
    #progress-inner {
      position: absolute; inset: 18px;
      border-radius: 50%;
      background: rgba(10,8,6,0.85);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    }
    #progress-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'SoukouMincho','Courier New',monospace;
      font-size: 22px; font-weight: 900; color: rgba(255,200,80,0.85);
      letter-spacing: 1px; z-index: 1;
      text-shadow: 0 0 6px rgba(255,150,0,0.4);
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; color: rgba(255,255,255,0.75);
      font-size: 20px; line-height: 1;
    }

    #hud-bottom {
      position: fixed; bottom: 14px; left: 14px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    #hud-bottom .hint { color: #888; font-size: 11px; }
    #sound-btn {
      pointer-events: all; cursor: pointer;
      background: rgba(0,0,0,0.5); border: 1px solid #555;
      color: #ccc; font-size: 12px; padding: 3px 8px;
      border-radius: 3px; width: fit-content;
    }
    #sound-btn:hover { background: rgba(80,80,80,0.5); }

    #overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center; flex-direction: column;
      background: rgba(0,0,0,0.72); gap: 18px;
    }
    #overlay-text {
      font-size: 52px; font-weight: bold; letter-spacing: 3px;
      color: #fff; text-shadow: 0 0 20px currentColor;
    }
    #overlay-text.red { color: #e74c3c; }
    #overlay-text.green { color: #2ecc71; }
    #overlay-text.gold { color: #f1c40f; }
    #overlay-sub { font-size: 18px; color: #ccc; }
    #overlay-btn {
      font-size: 16px; padding: 8px 26px;
      background: #2c3e50; color: #fff;
      border: 1px solid #7f8c8d; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    #overlay-btn:hover { background: #34495e; }

    #lock-hint {
      position: fixed; bottom: 40%; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px;
      pointer-events: none; text-align: center;
    }
    /* ── スマホ対応 ── */
    @media (max-width: 768px) {
      #hud-hp { top: 6px; left: 6px; }
      #hud-hp .label { font-size: 8px; }
      .hp-seg { width: 22px; height: 10px; }
      #charge-bar-wrap { width: 90px; height: 8px; }
      #charge-status { font-size: 9px; }
      #hud-stage { top: 6px; right: 6px; font-size: 12px; }
      #enemy-count { font-size: 18px; }
      #progress-wrap { width: 100px; height: 100px; }
      #progress-text { font-size: 14px; }
      #hud-bottom { display: none; }
      #crosshair { font-size: 16px; }
      #overlay-text { font-size: 32px; }
      #overlay-sub { font-size: 14px; }
      #overlay-btn { font-size: 13px; padding: 6px 18px; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-Cg5L-bLa.js"></script>
</head>
<body>
  <div id="hud-hp">
    <div class="label">HP</div>
    <div class="hp-segs">
      <div id="hp1" class="hp-seg hp-on"></div>
      <div id="hp2" class="hp-seg hp-on"></div>
      <div id="hp3" class="hp-seg hp-on"></div>
      <div id="hp4" class="hp-seg hp-on"></div>
      <div id="hp5" class="hp-seg hp-on"></div>
      <div id="hp6" class="hp-seg hp-on"></div>
    </div>
    <div id="charge-bar-wrap"><div id="charge-bar"></div></div>
    <div id="charge-status"></div>
  </div>

  <div id="hud-stage">
    <span id="stage-label">Stage 1</span>
    <div id="enemy-count"></div>
    <div id="progress-wrap">
      <div id="progress-ring"></div>
      <div id="progress-inner"></div>
      <span id="progress-text">0/24</span>
    </div>
  </div>
  <div id="crosshair">+</div>
  <div id="no-damage-hud" style="display:none;position:fixed;top:50%;right:14px;transform:translateY(-50%);
    border:2px solid rgba(255,215,0,0.6);border-radius:4px;padding:6px 12px;
    background:rgba(0,0,0,0.5);color:#ffd700;font-size:12px;font-weight:bold;
    letter-spacing:2px;pointer-events:none;z-index:50;text-shadow:0 0 8px rgba(255,215,0,0.4);">
    ノーダメ継続中
  </div>

  <div id="hud-bottom">
    <div class="hint">WASD: 移動 | マウス: 照準 | 左クリック: 発射 | 右クリック長押し: チャージ弾 | E: 次へ/リスタート</div>
    <button id="sound-btn">サウンド ON</button>
  </div>

  <div id="lock-hint">クリックでポインターロック（マウス操作開始）</div>

  <!-- DEVボタン -->
  <div id="dev-buttons" style="position:fixed;bottom:80px;left:14px;display:none;flex-direction:column;gap:4px;z-index:200;">
    <div style="font-size:9px;color:rgba(255,150,0,0.4);letter-spacing:2px;text-align:center;">DEV</div>
    <button id="dev-final" style="padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:3px;background:#442;color:#ff8;font-size:11px;cursor:pointer;font-family:monospace;">最終戦</button>
    <button id="dev-clear" style="padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:3px;background:#224;color:#adf;font-size:11px;cursor:pointer;font-family:monospace;">クリア画面</button>
    <button id="dev-nodmg-final" style="padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:3px;background:#432;color:#fa0;font-size:11px;cursor:pointer;font-family:monospace;">ノーダメ最終戦</button>
    <button id="dev-nodmg" style="padding:4px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:3px;background:#442;color:#fd0;font-size:11px;cursor:pointer;font-family:monospace;">ノーダメクリア</button>
  </div>

  <!-- モバイルタッチUI -->
  <div id="touch-controls" style="display:none;">
    <div id="touch-stick" style="position:fixed;bottom:30px;left:20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.25);touch-action:none;z-index:100;">
      <div id="touch-knob" style="position:absolute;top:50%;left:50%;width:40px;height:40px;margin:-20px;border-radius:50%;background:rgba(255,255,255,0.35);pointer-events:none;"></div>
    </div>
    <div id="touch-fire" style="position:fixed;bottom:30px;right:20px;width:70px;height:70px;border-radius:50%;background:rgba(255,100,50,0.25);border:2px solid rgba(255,100,50,0.5);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,0.7);font-weight:bold;touch-action:none;z-index:100;">FIRE</div>
    <div id="touch-next" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;background:rgba(100,200,100,0.2);border:2px solid rgba(100,200,100,0.4);display:none;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,0.6);font-weight:bold;touch-action:none;z-index:100;">NEXT</div>
  </div>

  <div id="overlay">
    <div id="overlay-text">GAME OVER</div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn">リスタート</button>
  </div>

  <!-- 最終クリア画面 -->
  <div id="clear-screen" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#000; z-index:300; display:none; align-items:center; justify-content:center;
    flex-direction:column; pointer-events:auto;
  ">
    <div style="position:relative; width:100%; height:100%;">
      <img src="./clear_bg.png" style="width:100%; height:100%; object-fit:cover; filter:brightness(1.4);" />
      <div id="clear-text" style="
        position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
        font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;
        color:#eeddcc; text-shadow:0 0 10px rgba(0,0,0,0.9), 2px 2px 4px #000;
        line-height:2.4; letter-spacing:3px; text-align:left;
        font-weight:900; -webkit-text-stroke:1px #eeddcc;
      ">
        <div style="font-size:48px;opacity:0;">こうして我々は</div>
        <div style="font-size:48px;opacity:0;">戦車でいまわしきエネミーを</div>
        <div style="font-size:48px;opacity:0;">ぶっ壊した</div>
        <div id="clear-nodmg-line" style="font-size:48px;opacity:0;">無傷でな</div>
      </div>
      <div id="clear-stage-info" style="
        position:absolute; top:8%; right:8%;
        font-family:'Yu Mincho',serif;
        color:#ff2200; font-size:32px; font-weight:900;
        text-shadow:0 0 12px rgba(255,30,0,0.6);
      "></div>
    </div>
  </div>

  <div id="boss-hp-bar" style="display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); pointer-events:none; text-align:center;">
    <div style="color:#ff4444; font-size:12px; font-family:'Courier New',monospace; font-weight:bold; margin-bottom:5px; text-shadow:0 0 6px #ff0000; letter-spacing:3px;">BOSS HP</div>
    <div style="width:240px; height:13px; background:#2a2a2a; border:1px solid #888; border-radius:4px; overflow:hidden;">
      <div id="boss-hp-inner" style="height:100%; width:100%; background:#e74c3c; border-radius:4px; transition:width 0.15s;"></div>
    </div>
  </div>

</body>
</html>
