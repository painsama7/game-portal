<head>

  <meta charset="UTF-8" />

  <meta property="og:title" content="戦車道 - 3D戦車バトル">

  <style>
    @font-face {
      font-family: 'SoukouMincho';
      src: url('SoukouMincho.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Letrogo';
      src: url('851letrogo_007.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { background: #1a1a2e; overflow: hidden; font-family: 'SoukouMincho','Courier New', monospace; }
    canvas { display: block; }

    /* ── HP Panel (左上・格ゲー風) ────────────────────── */
    #hud-hp {
      position: fixed; top: 14px; left: 14px;
      color: #fff; font-size: 13px; pointer-events: none;
    }
    #hud-hp .label {
      font-family: 'Letrogo','Courier New',monospace;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(255,200,80,0.7); margin-bottom: 4px;
    }
    .hp-segs { display: flex; gap: 0; }
    .hp-seg {
      width: 38px; height: 14px;
      border: 2px solid rgba(255,180,60,0.8);
      border-right: none;
      transform: skewX(-14deg);
      transition: background 0.08s, box-shadow 0.08s;
    }
    .hp-seg:last-child { border-right: 2px solid rgba(255,180,60,0.8); }
    /* 左=赤 → 中=黄 → 右=緑 */
    .hp-seg:nth-child(1).hp-on { background: #ff2200; box-shadow: 0 0 7px #ff2200; border-color: rgba(255,100,60,0.9); }
    .hp-seg:nth-child(2).hp-on { background: #ff5500; box-shadow: 0 0 7px #ff5500; border-color: rgba(255,140,60,0.9); }
    .hp-seg:nth-child(3).hp-on { background: #ffaa00; box-shadow: 0 0 7px #ffaa00; border-color: rgba(255,190,60,0.9); }
    .hp-seg:nth-child(4).hp-on { background: #ffdd00; box-shadow: 0 0 7px #ffdd00; border-color: rgba(255,230,80,0.9); }
    .hp-seg:nth-child(5).hp-on { background: #88cc00; box-shadow: 0 0 7px #88cc00; border-color: rgba(160,220,60,0.9); }
    .hp-seg:nth-child(6).hp-on { background: #22bb00; box-shadow: 0 0 7px #22bb00; border-color: rgba(80,200,60,0.9); }
    .hp-seg:last-child.hp-on { border-right-color: inherit; }
    .hp-off {
      background: rgba(30,10,0,0.7) !important;
      box-shadow: none !important;
      border-color: rgba(100,50,20,0.5) !important;
    }
    .hp-seg.dmg-flash {
      background: #ffffff !important;
      box-shadow: 0 0 16px #fff !important;
    }

    #charge-status {
      margin-top: 6px; font-size: 12px; min-height: 16px;
      letter-spacing: 1px; font-weight: bold;
    }
    #charge-bar-wrap {
      margin-top: 5px; width: 140px; height: 12px;
      background: #333; border-radius: 4px; overflow: hidden; display: none;
      border: 1px solid #555;
    }
    #charge-bar {
      height: 100%; width: 0%; background: #ff8800;
      border-radius: 4px; transition: width 0.1s linear;
    }

    /* ── Stage + Enemy Count (右上) ────────────────────── */
    #hud-stage {
      position: fixed; top: 14px; right: 14px;
      color: #fff; font-size: 15px; font-weight: bold;
      pointer-events: none; text-shadow: 0 0 6px #000;
      text-align: right;
    }
    #stage-label {
      font-family: 'SoukouMincho','Courier New',monospace;
      letter-spacing: 3px;
    }
    #enemy-count {
      font-family: 'SoukouMincho','Courier New',monospace;
      color: #ff2200; font-size: 26px; font-weight: 900;
      text-shadow: 0 0 10px rgba(255,30,0,0.8), 0 0 25px rgba(255,50,0,0.4);
      margin-top: 4px; letter-spacing: 2px;
    }

    /* ── Progress Ring ──────────────────────────── */
    #progress-wrap {
      position: relative; width: 187px; height: 187px;
      margin-top: 8px; margin-left: auto;
    }
    #progress-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        rgba(100,50,20,0.5) 0deg 360deg
      );
      box-shadow: 0 0 8px rgba(255,120,0,0.15);
    }
    #progress-inner {
      position: absolute; inset: 18px;
      border-radius: 50%;
      background: rgba(10,8,6,0.85);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    }
    #progress-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'SoukouMincho','Courier New',monospace;
      font-size: 22px; font-weight: 900; color: rgba(255,200,80,0.85);
      letter-spacing: 1px; z-index: 1;
      text-shadow: 0 0 6px rgba(255,150,0,0.4);
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; color: rgba(255,255,255,0.75);
      font-size: 20px; line-height: 1;
    }

    #hud-bottom {
      position: fixed; bottom: 14px; left: 14px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    #hud-bottom .hint { color: #888; font-size: 11px; }
    #sound-btn {
      pointer-events: all; cursor: pointer;
      background: rgba(0,0,0,0.5); border: 1px solid #555;
      color: #ccc; font-size: 12px; padding: 3px 8px;
      border-radius: 3px; width: fit-content;
    }
    #sound-btn:hover { background: rgba(80,80,80,0.5); }

    #overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center; flex-direction: column;
      background: rgba(0,0,0,0.72); gap: 18px;
    }
    #overlay-text {
      font-size: 52px; font-weight: bold; letter-spacing: 3px;
      color: #fff; text-shadow: 0 0 20px currentColor;
    }
    #overlay-text.red { color: #e74c3c; }
    #overlay-text.green { color: #2ecc71; }
    #overlay-text.gold { color: #f1c40f; }
    #overlay-sub { font-size: 18px; color: #ccc; }
    #overlay-btn {
      font-size: 16px; padding: 8px 26px;
      background: #2c3e50; color: #fff;
      border: 1px solid #7f8c8d; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    #overlay-btn:hover { background: #34495e; }

    #lock-hint {
      position: fixed; bottom: 40%; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px;
      pointer-events: none; text-align: center;
    }
  </style>
  <script type="module" crossorigin src="./assets/index--d74otcL.js"></script>
</head>
<body>
  <div id="hud-hp">
    <div class="label">HP</div>
    <div class="hp-segs">
      <div id="hp1" class="hp-seg hp-on"></div>
      <div id="hp2" class="hp-seg hp-on"></div>
      <div id="hp3" class="hp-seg hp-on"></div>
      <div id="hp4" class="hp-seg hp-on"></div>
      <div id="hp5" class="hp-seg hp-on"></div>
      <div id="hp6" class="hp-seg hp-on"></div>
    </div>
    <div id="charge-bar-wrap"><div id="charge-bar"></div></div>
    <div id="charge-status"></div>
  </div>

  <div id="hud-stage">
    <span id="stage-label">Stage 1</span>
    <div id="enemy-count"></div>
    <div id="progress-wrap">
      <div id="progress-ring"></div>
      <div id="progress-inner"></div>
      <span id="progress-text">0/24</span>
    </div>
  </div>
  <div id="crosshair">+</div>

  <div id="hud-bottom">
    <div class="hint">WASD: 移動 | マウス: 照準 | 左クリック: 発射 | 右クリック長押し: チャージ弾 | E: 次へ/リスタート</div>
    <button id="sound-btn">サウンド ON</button>
  </div>

  <div id="lock-hint">クリックでポインターロック（マウス操作開始）</div>

  <div id="overlay">
    <div id="overlay-text">GAME OVER</div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn">リスタート</button>
  </div>

  <div id="boss-hp-bar" style="display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); pointer-events:none; text-align:center;">
    <div style="color:#ff4444; font-size:12px; font-family:'Courier New',monospace; font-weight:bold; margin-bottom:5px; text-shadow:0 0 6px #ff0000; letter-spacing:3px;">BOSS HP</div>
    <div style="width:240px; height:13px; background:#2a2a2a; border:1px solid #888; border-radius:4px; overflow:hidden;">
      <div id="boss-hp-inner" style="height:100%; width:100%; background:#e74c3c; border-radius:4px; transition:width 0.15s;"></div>
    </div>
  </div>

</body>
</html>
